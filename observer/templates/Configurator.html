<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="/bootstrap.min.css">
    <script src="/bootstrap.min.js"></script>
    <script src="/htmx.min.js"></script>

    <title>Observer Configurator</title>
</head>

<body>
    <div class="container">
        <h1 align="center">Configurator</h1>
        <div class="row" align="center">
            <div class="col" align="left">
                <input type="button" class="btn btn-primary" value="Save State" hx-post="{configuratorURL}"
                    hx-swap="none">
                <div class="btn-group ms-2">
                    <button type="button" class="btn btn-warning" onclick="clearShape()">Clear All</button>
                    <button type="button" class="btn btn-success" onclick="submitShape()">Submit Shape</button>
                    <button type="button" class="btn btn-secondary" onclick="toggleEditMode()">Toggle Edit/Draw</button>
                </div>
                <div class="d-inline-block ms-3">
                    <label for="modeSelect" class="form-label mb-0 fw-bold">Tool Mode:</label>
                    <select id="modeSelect" class="form-select form-select-sm d-inline-block w-auto" onchange="toggleMode()">
                        <option value="az">Active Zone</option>
                        <option value="calibration">Calibration</option>
                        <option value="nudge">Nudge Hexes</option>
                    </select>
                </div>
                <div class="form-check form-switch d-inline-block ms-3">
                    <input class="form-check-input" type="checkbox" id="showGridConfig" checked
                        onchange="toggleConfigOverlays()">
                    <label class="form-check-label" for="showGridConfig">Show Grid</label>
                </div>
                <div class="form-check form-switch d-inline-block ms-3">
                    <input class="form-check-input" type="checkbox" id="showObjectsConfig" checked
                        onchange="toggleConfigOverlays()">
                    <label class="form-check-label" for="showObjectsConfig">Show Objects</label>
                </div>
                <div id="statusMessage" class="d-inline-block ms-3 fw-bold"></div>
            </div>
            <div class="col" align="right">
                <input class="btn btn-info" type="button" value="Observer" onclick="window.location.href='/'">
            </div>
        </div>
        {cameraConfigRows}
        <div class="container" align="right" style="margin-top: 1rem">
            <input type="button" class="btn btn-primary" value="Add Camera"
                onclick="window.location.href='{configuratorURL}new_camera'">
        </div>

        <div class="row" align="left">
            <div class="container border border-3 border-info" align="left">
                <h3>Grid Configuration</h3>
                <form hx-post="{configuratorURL}grid_configuration" hx-swap="outerHTML">
                    <input type="number" class="form-check-input bg-info" name="size" min="10" max="60" value="{size}"
                        style="width:4em">
                    <label class="form-check-label" for="size">Size</label><br>
                    <input type="submit" class="btn btn-primary bg-secondary" value="Submit Grid Configuration">
                </form>
            </div>
        </div>
    </div>
</body>
<script>

    function toggleConfigOverlays() {
        let formData = new FormData();
        formData.append('show_grid', document.getElementById('showGridConfig').checked);
        formData.append('show_objects', document.getElementById('showObjectsConfig').checked);
        fetch('{configuratorURL}set_overlays', { method: 'POST', body: formData });
    }

    var cameraNames = __CAMERA_NAMES_JSON__;
    var calibrationPts = __CALIBRATION_PTS_JSON__ || [];
    var allNudges = __NUDGES_JSON__ || {};
    var manualPoints = {};
    var axialPoints = {};
    var editMode = false;
    var dragPointIndex = -1;
    var dragCamName = null;
    var currentCol = {};
    var currentRow = {};
    var colAnchor = {};  // axial [q, r] of the first point in the current column
    var loadedCams = {};

    cameraNames.forEach(function (name) {
        manualPoints[name] = [];
        axialPoints[name] = [];
        currentCol[name] = 0;
        currentRow[name] = 0;
        colAnchor[name] = [0, 0];
    });

    function resizeCanvas() {
        cameraNames.forEach(function (camName) {
            var canvas = document.getElementById('overlayCanvas_' + camName);
            var img = document.getElementById('cam' + camName);
            if (canvas && img) {
                canvas.width = img.naturalWidth || img.clientWidth;
                canvas.height = img.naturalHeight || img.clientHeight;
                canvas.style.width = img.clientWidth + 'px';
                canvas.style.height = img.clientHeight + 'px';
                canvas.style.left = img.offsetLeft + 'px';
                canvas.style.top = img.offsetTop + 'px';

                if (!loadedCams[camName] && canvas.width > 0 && calibrationPts.length > 0) {
                    calibrationPts.forEach(entry => {
                        if (entry[camName]) {
                            var pixelChunk = entry[camName][0];
                            var axialChunk = entry[camName][2];
                            for (var i = 0; i < pixelChunk.length; i++) {
                                manualPoints[camName].push([pixelChunk[i][0] / canvas.width, pixelChunk[i][1] / canvas.height]);
                                axialPoints[camName].push([axialChunk[i][0], axialChunk[i][1]]);
                            }
                        }
                    });

                    if (manualPoints[camName].length > 0) {
                        renderActiveCalibrationTable(camName);
                    }
                    loadedCams[camName] = true;
                }

                drawPoints(camName);
            }
        });
        toggleMode(); // Ensure correct state on load
    }

    window.onload = function () {
        resizeCanvas();
    };

    // Poll resizing just in case images load late
    setInterval(function () {
        var needsResize = false;
        cameraNames.forEach(function (camName) {
            var canvas = document.getElementById('overlayCanvas_' + camName);
            var img = document.getElementById('cam' + camName);
            if (canvas && img && (canvas.clientWidth !== img.clientWidth || canvas.clientHeight !== img.clientHeight || canvas.offsetLeft !== img.offsetLeft || canvas.offsetTop !== img.offsetTop)) {
                needsResize = true;
            }
        });
        if (needsResize) {
            resizeCanvas();
        }
    }, 1000);

    function getMousePos(canvas, evt) {
        var rect = canvas.getBoundingClientRect();
        return {
            x: evt.offsetX, // offsetX is relative to target element (canvas)
            y: evt.offsetY
        };
    }

    function stopDrag() {
        dragPointIndex = -1;
        dragCamName = null;
    }

    // Attach global mouseup to catch releases outside canvas
    window.addEventListener('mouseup', stopDrag);

    function onMouseDown(camName, event) {
        var canvas = document.getElementById('overlayCanvas_' + camName);
        var pos = getMousePos(canvas, event);
        var x = pos.x;
        var y = pos.y;
        var w = canvas.clientWidth;
        var h = canvas.clientHeight;

        var mode = document.getElementById('modeSelect') ? document.getElementById('modeSelect').value : 'calibration';

        if (mode === 'nudge') {
            fetch('{configuratorURL}nudge_select/' + camName + '?px=' + (x/w) + '&py=' + (y/h))
                .then(res => res.json())
                .then(data => {
                    if (data.error) { alert("Error: " + data.error); return; }
                    toggleNudgeSelection(camName, data);
                });
            return;
        }

        // Ensure array exists and is valid
        if (!manualPoints[camName]) manualPoints[camName] = [];

        // Filter out any undefined/null points to prevent "reading '1'" error
        manualPoints[camName] = manualPoints[camName].filter(p => p && p.length === 2);

        if (editMode) {
            // Check if clicking near existing point to drag
            for (var i = 0; i < manualPoints[camName].length; i++) {
                var px = manualPoints[camName][i][0] * w;
                var py = manualPoints[camName][i][1] * h;
                var dist = Math.sqrt((x - px) * (x - px) + (y - py) * (y - py));
                if (dist < 20) {
                    dragPointIndex = i;
                    dragCamName = camName;
                    return;
                }
            }
        } else {
            var col = currentCol[camName] || 0;
            var row = currentRow[camName] || 0;

            var rowDQ = parseInt(document.getElementById('rowIncrQ_' + camName).value) || 8;
            var rowDR = parseInt(document.getElementById('rowIncrR_' + camName).value) || 0;
            var colDQ = parseInt(document.getElementById('colIncrQ_' + camName).value) || -2;
            var colDR = parseInt(document.getElementById('colIncrR_' + camName).value) || 4;

            var predictedQ, predictedR;
            if (axialPoints[camName].length === 0) {
                // Very first point: start at origin
                predictedQ = 0;
                predictedR = 0;
            } else if (row === 0) {
                // First point of a new column: apply colDelta to the previous column's anchor
                predictedQ = colAnchor[camName][0] + colDQ;
                predictedR = colAnchor[camName][1] + colDR;
            } else {
                // Subsequent point in same column: apply rowDelta to the previous point
                var prev = axialPoints[camName][axialPoints[camName].length - 1];
                predictedQ = prev[0] + rowDQ;
                predictedR = prev[1] + rowDR;
            }

            // Record column anchor on the first point of each column
            if (row === 0) {
                colAnchor[camName] = [predictedQ, predictedR];
            }

            manualPoints[camName].push([x / w, y / h]);
            axialPoints[camName].push([predictedQ, predictedR]);

            // Advance for next click
            currentRow[camName] = row + 1;

            drawPoints(camName);
            renderActiveCalibrationTable(camName);
        }
    }

    function onMouseMove(camName, event) {
        if (dragPointIndex !== -1 && dragCamName === camName) {
            // Safety check
            if (!manualPoints[camName] || !manualPoints[camName][dragPointIndex]) {
                stopDrag();
                return;
            }

            var canvas = document.getElementById('overlayCanvas_' + camName);
            var pos = getMousePos(canvas, event);
            var w = canvas.clientWidth;
            var h = canvas.clientHeight;
            manualPoints[camName][dragPointIndex] = [pos.x / w, pos.y / h];
            drawPoints(camName);
            renderActiveCalibrationTable(camName);
        }
    }

    function drawPoints(camName) {
        var canvas = document.getElementById('overlayCanvas_' + camName);
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var w = canvas.width;
        var h = canvas.height;

        ctx.fillStyle = 'red';
        ctx.strokeStyle = '#00FF00';
        ctx.lineWidth = 3;

        var points = manualPoints[camName];
        if (points && points.length > 0) {
            ctx.beginPath();
            for (var i = 0; i < points.length; i++) {
                var x = points[i][0] * w;
                var y = points[i][1] * h;

                if (i == 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);

                ctx.fillRect(x - 5, y - 5, 10, 10);
                // Draw text for sequence order
                ctx.fillText(i + 1, x + 8, y + 8);
            }
            ctx.stroke();
        }
        
        // Draw nudged hex previews
        if (selectedNudgeHexes[camName]) {
            var shift = currentNudgeShift[camName] || {dx:0, dy:0};
            for (var key in selectedNudgeHexes[camName]) {
                var hexObj = selectedNudgeHexes[camName][key];
                if (hexObj && hexObj.poly) {
                    ctx.beginPath();
                    ctx.fillStyle = "rgba(0, 255, 255, 0.3)";
                    ctx.strokeStyle = "rgba(0, 255, 255, 0.8)";
                    for (var i = 0; i < hexObj.poly.length; i++) {
                        var px = hexObj.poly[i][0] + shift.dx;
                        var py = hexObj.poly[i][1] + shift.dy;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
            }
        }
    }

    var selectedNudgeHexes = {};
    var currentNudgeShift = {};

    function toggleNudgeSelection(camName, data) {
        if (!selectedNudgeHexes[camName]) selectedNudgeHexes[camName] = {};
        if (!currentNudgeShift[camName]) currentNudgeShift[camName] = {dx: 0, dy: 0};
        
        var key = data.q + "," + data.r;
        if (selectedNudgeHexes[camName][key]) {
            delete selectedNudgeHexes[camName][key];
        } else {
            selectedNudgeHexes[camName][key] = data;
            // Pre-populate shift from server's existing nudge if this is the first selection
            if (Object.keys(selectedNudgeHexes[camName]).length === 1 &&
                    (data.existing_dx || data.existing_dy)) {
                currentNudgeShift[camName] = {dx: data.existing_dx || 0, dy: data.existing_dy || 0};
            }
        }
        renderNudgeUI(camName);
        renderNudgeTable(camName);
        drawPoints(camName);
    }

    function applyNudgeShift(camName, ddx, ddy) {
        if (!currentNudgeShift[camName]) currentNudgeShift[camName] = {dx: 0, dy: 0};
        currentNudgeShift[camName].dx += ddx;
        currentNudgeShift[camName].dy += ddy;
        drawPoints(camName);
        renderNudgeUI(camName);
    }
    
    function resetNudgeShift(camName) {
        if (currentNudgeShift[camName]) {
            currentNudgeShift[camName].dx = 0;
            currentNudgeShift[camName].dy = 0;
            drawPoints(camName);
        }
    }
    
    function clearNudgeSelection(camName) {
        selectedNudgeHexes[camName] = {};
        resetNudgeShift(camName);
        renderNudgeUI(camName);
        drawPoints(camName);
    }

    function commitNudge(camName, resetServer) {
        var hexes = [];
        if (selectedNudgeHexes[camName]) {
            for (var key in selectedNudgeHexes[camName]) {
                var hObj = selectedNudgeHexes[camName][key];
                hexes.push({q: hObj.q, r: hObj.r});
            }
        }
        if (hexes.length === 0) return;
        
        var dx = currentNudgeShift[camName] ? currentNudgeShift[camName].dx : 0;
        var dy = currentNudgeShift[camName] ? currentNudgeShift[camName].dy : 0;
        
        var payload = {
            hexes: hexes,
            dx: dx,
            dy: dy,
            reset: resetServer
        };
        
        var uiDiv = document.getElementById('nudgeUI_' + camName);
        if (uiDiv) uiDiv.innerHTML = '<div class="card p-2 mt-2 bg-dark text-white border-warning text-center">Updating grid...</div>';
        
        fetch('{configuratorURL}nudge/' + camName, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        }).then(function(res) { return res.json(); }).then(function(data) {
            if (data.status === 'success') {
                // Update local nudge state
                if (!allNudges[camName]) allNudges[camName] = {};
                hexes.forEach(function(h) {
                    var k = h.q + ',' + h.r;
                    if (resetServer) {
                        delete allNudges[camName][k];
                    } else {
                        allNudges[camName][k] = [dx, dy];
                    }
                });
                resetNudgeShift(camName);
                if (resetServer) {
                    clearNudgeSelection(camName);
                } else {
                    renderNudgeUI(camName);
                }
                renderNudgeTable(camName);
            } else {
                alert("Error: " + data.error);
                renderNudgeUI(camName);
            }
        });
    }

    function renderNudgeUI(camName) {
        var uiDiv = document.getElementById('nudgeUI_' + camName);
        if (!uiDiv) return;
        
        var sel = selectedNudgeHexes[camName] || {};
        var keys = Object.keys(sel);
        var clearAllHtml = `<div class="d-flex justify-content-center mt-2"><button class="btn btn-sm btn-danger" onclick="clearAllNudges('${camName}')">Clear ALL Nudges for Camera</button></div>`;
        
        if (keys.length === 0) {
            uiDiv.innerHTML = '<div class="card p-2 mt-2 bg-dark text-white border-warning text-center">Click hexes to select them for nudging.' + clearAllHtml + '</div>';
            return;
        }
        
        var shift = currentNudgeShift[camName] || {dx:0, dy:0};
        
        uiDiv.innerHTML = `
        <div class="card p-2 mt-2 bg-dark text-white border-warning">
            <h5>Selected Hexes: ${keys.length}</h5>
            <div class="text-center mb-2 text-info small">Preview Shift: [${shift.dx}, ${shift.dy}]</div>
            <div class="d-flex justify-content-center mb-2">
                <button class="btn btn-outline-warning" onclick="applyNudgeShift('${camName}', 0, -5)">Up</button>
            </div>
            <div class="d-flex justify-content-center mb-2 gap-2">
                <button class="btn btn-outline-warning" onclick="applyNudgeShift('${camName}', -5, 0)">Left</button>
                <button class="btn btn-outline-warning" onclick="applyNudgeShift('${camName}', 5, 0)">Right</button>
            </div>
            <div class="d-flex justify-content-center mb-2">
                <button class="btn btn-outline-warning" onclick="applyNudgeShift('${camName}', 0, 5)">Down</button>
            </div>
            <div class="d-flex justify-content-center mb-2 gap-2">
                <button class="btn btn-sm btn-success" onclick="commitNudge('${camName}', false)">Commit Nudge to Grid</button>
                <button class="btn btn-sm btn-outline-danger" onclick="commitNudge('${camName}', true)">Reset Server Nudge</button>
            </div>
            <div class="d-flex justify-content-center mt-2 gap-2">
                <button class="btn btn-sm btn-secondary" onclick="clearNudgeSelection('${camName}')">Clear Selection</button>
            </div>
            ${clearAllHtml}
        </div>
        `;
    }

    function clearAllNudges(camName) {
        if (!confirm("Are you sure you want to clear ALL nudges for " + camName + "?")) return;
        
        var payload = {
            hexes: [],
            dx: 0,
            dy: 0,
            reset: false,
            reset_all: true
        };
        
        var uiDiv = document.getElementById('nudgeUI_' + camName);
        if (uiDiv) uiDiv.innerHTML = '<div class="card p-2 mt-2 bg-dark text-white border-warning text-center">Clearing all nudges...</div>';
        
        fetch('{configuratorURL}nudge/' + camName, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        }).then(function(res) { return res.json(); }).then(function(data) {
            if (data.status === 'success') {
                allNudges[camName] = {};
                selectedNudgeHexes[camName] = {};
                resetNudgeShift(camName);
                renderNudgeUI(camName);
                renderNudgeTable(camName);
            } else {
                alert("Error: " + data.error);
                renderNudgeUI(camName);
            }
        });
    }

    function renderNudgeTable(camName) {
        var container = document.getElementById('nudgeTableContainer_' + camName);
        var inner = document.getElementById('nudgeTableInner_' + camName);
        if (!container || !inner) return;
        var nudges = allNudges[camName] || {};
        var keys = Object.keys(nudges);
        container.style.display = keys.length > 0 ? 'block' : 'none';
        if (keys.length === 0) {
            inner.innerHTML = '<p class="text-muted small">No nudges defined yet.</p>';
            return;
        }
        var rows = keys.map(function(k) {
            var parts = k.split(',');
            var dx = nudges[k][0], dy = nudges[k][1];
            return '<tr><td>' + parts[0] + '</td><td>' + parts[1] + '</td><td>' + dx + '</td><td>' + dy + '</td></tr>';
        }).join('');
        inner.innerHTML = '<div class="table-responsive" style="max-height:200px;overflow-y:auto;"><table class="table table-sm table-bordered table-dark text-center mb-0"><thead><tr><th>Q</th><th>R</th><th>dx</th><th>dy</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
    }

    function advanceColumn(camName) {
        if (!currentCol[camName]) currentCol[camName] = 0;
        currentCol[camName] += 1;
        currentRow[camName] = 0;
        showStatus("Switched to Column " + currentCol[camName] + " for " + camName, false);
    }

    function clearShape(camName) {
        if (camName) {
            manualPoints[camName] = [];
            axialPoints[camName] = [];
            currentCol[camName] = 0;
            currentRow[camName] = 0;
            colAnchor[camName] = [0, 0];
            stopDrag();
            drawPoints(camName);
            renderActiveCalibrationTable(camName);
        } else {
            cameraNames.forEach(function (name) {
                manualPoints[name] = [];
                axialPoints[name] = [];
                currentCol[name] = 0;
                currentRow[name] = 0;
                colAnchor[name] = [0, 0];
                drawPoints(name);
                renderActiveCalibrationTable(name);
            });
            stopDrag();
        }
    }

    function toggleEditMode() {
        editMode = !editMode;
        var btn = event.target || event.srcElement;
        // In case event.target doesn't work if called differently, let's gracefully fail or find it
        if (btn && btn.tagName === 'BUTTON') {
            btn.innerText = editMode ? "Edit Mode: ON" : "Toggle Edit/Draw";
            btn.classList.toggle("btn-danger", editMode);
            btn.classList.toggle("btn-secondary", !editMode);
        }
    }

    function showStatus(msg, isError) {
        var el = document.getElementById('statusMessage');
        el.innerText = msg;
        el.className = "d-inline-block ms-3 fw-bold " + (isError ? "text-danger" : "text-success");
        setTimeout(function () { el.innerText = ""; }, 5000);
    }

    function submitShape() {
        var validData = {};
        var count = 0;

        cameraNames.forEach(function (name) {
            // Need at least 4 points to compute homography or 3 for affine fallback
            if (manualPoints[name] && manualPoints[name].length >= 3) {
                validData[name] = {
                    pixel: manualPoints[name],
                    axial: axialPoints[name]
                };
                count++;
            }
        });

        if (count === 0) {
            showStatus("Please define at least 3 points on at least one camera.", true);
            return;
        }

        fetch(`{calibratorURL}manual_calibration`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(validData)
        }).then(response => {
            if (response.ok) {
                showStatus("Calibration submitted successfully!", false);
                // Optionally reload page to update table? or just update local list if we knew the return format
                // For now, let's just leave it. If user refreshes, they see the new data.
                setTimeout(() => location.reload(), 1000);
            } else {
                response.text().then(text => showStatus("Error: " + text, true));
            }
        }).catch(e => showStatus("Network error: " + e, true));
    }



    function renderActiveCalibrationTable(camName) {
        var container = document.getElementById('activeCalibTableContainer_' + camName);
        var tbody = document.querySelector('#activeCalibTable_' + camName + ' tbody');
        if (!container || !tbody) return;

        var points = manualPoints[camName];
        var axials = axialPoints[camName];

        if (!points || points.length === 0) {
            container.style.display = 'none';
            tbody.innerHTML = '';
            return;
        }

        container.style.display = 'block';
        tbody.innerHTML = '';

        points.forEach((pt, i) => {
            var row = document.createElement('tr');

            var px = pt[0].toFixed(4);
            var py = pt[1].toFixed(4);
            var q = axials[i] ? axials[i][0] : 0;
            var r = axials[i] ? axials[i][1] : 0;

            row.innerHTML = `
                <td>P${i + 1}</td>
                <td><input type="number" step="0.0001" class="form-control form-control-sm text-center" value="${px}" onchange="updateManualPoint('${camName}', ${i}, 'x', this.value)"></td>
                <td><input type="number" step="0.0001" class="form-control form-control-sm text-center" value="${py}" onchange="updateManualPoint('${camName}', ${i}, 'y', this.value)"></td>
                <td><input type="number" class="form-control form-control-sm text-center" value="${q}" onchange="updateAxialPoint('${camName}', ${i}, 'q', this.value)"></td>
                <td><input type="number" class="form-control form-control-sm text-center" value="${r}" onchange="updateAxialPoint('${camName}', ${i}, 'r', this.value)"></td>
            `;
            tbody.appendChild(row);
        });
    }

    function updateManualPoint(camName, index, axis, value) {
        var val = parseFloat(value);
        if (!isNaN(val)) {
            if (axis === 'x') manualPoints[camName][index][0] = val;
            if (axis === 'y') manualPoints[camName][index][1] = val;
            drawPoints(camName);
        }
    }

    function updateAxialPoint(camName, index, axis, value) {
        var val = parseInt(value, 10);
        if (!isNaN(val)) {
            if (axis === 'q') axialPoints[camName][index][0] = val;
            if (axis === 'r') axialPoints[camName][index][1] = val;
        }
    }

    function clearCamAZ(camName, event) {
        const formField = document.getElementById(`cam${camName}_ActiveZone`)
        formField.value = '[]'
    }

    // Kept old camClickListener for reference, but it might conflict with onMouseDown if both are active.
    // The new structure has canvas overlay which captures mouse events.
    // So the img onclick might not fire if canvas is on top.
    // Active Zone setting might need to be reintegrated if it's important.
    // The user requirement was "combine... configurator with manual triangle selection".
    // Does "active zone" still matter? Probably.
    // But how to switch between drawing AZ and drawing Calibration Triangle?
    // Maybe we assume AZ is set, and now we are doing calibration.
    // Or we need a mode switch.
    // Let's assume the canvas overlay is for Calibration.
    // If user wants to set AZ, maybe they need to disable calibration mode?
    // For now, I will prioritize Calibration as requested.

    function toggleMode() {
        var mode = document.getElementById('modeSelect') ? document.getElementById('modeSelect').value : 'calibration';
        var isActive = (mode === 'calibration' || mode === 'nudge');
        cameraNames.forEach(function (camName) {
            var canvas = document.getElementById('overlayCanvas_' + camName);
            if (canvas) {
                canvas.style.pointerEvents = isActive ? 'auto' : 'none';
                canvas.style.opacity = isActive ? '1' : '0.5'; 
            }
            var nudgeUI = document.getElementById('nudgeUI_' + camName);
            if (nudgeUI) {
                nudgeUI.style.display = (mode === 'nudge') ? 'block' : 'none';
            }
            var nudgeTableContainer = document.getElementById('nudgeTableContainer_' + camName);
            if (nudgeTableContainer) {
                nudgeTableContainer.style.display = (mode === 'nudge') ? 'block' : 'none';
            }
            // Always render nudge UI so Clear All is visible without needing a prior click
            if (mode === 'nudge') {
                renderNudgeUI(camName);
                renderNudgeTable(camName);
            }
        });
    }

    function camClickListener(camName, event) {
        const imgElem = document.getElementById(`cam${camName}`)
        var bounds = imgElem.getBoundingClientRect();
        var left = bounds.left;
        var top = bounds.top;
        var x = event.x - left;
        var y = event.y - top;
        var cw = imgElem.clientWidth;
        var ch = imgElem.clientHeight;
        var iw = imgElem.naturalWidth;
        var ih = imgElem.naturalHeight;
        var px = x / cw * iw;
        var py = y / ch * ih;

        const x_offset = 0;
        const x_scale = 1;
        const image_x = (px - x_offset) * x_scale;
        const y_offset = 0;
        const y_scale = 1;
        const image_y = (py - y_offset) * y_scale;

        const formField = document.getElementById(`cam${camName}_ActiveZone`);
        var formValue;
        try {
            formValue = JSON.parse(formField.value);
        }
        catch (err) {
            formValue = [];
        }
        formValue.push([~~image_x, ~~image_y]);
        formField.value = JSON.stringify(formValue);
        formField.dispatchEvent(new Event('change'));
    }
</script>
