<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="/bootstrap.min.css">
    <script src="/bootstrap.min.js"></script>
    <script src="/htmx.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/HarmonyTemplate.css">

    <title>Harmony</title>
</head>

<body>
    <div class="container">
        <h1 align="center">Harmony</h1>
        <hr>
        <div class="row justify-content-center mb-3">
            <h4>Session ID: {viewId}
                <button class="btn btn-sm btn-outline-secondary"
                    onclick="document.getElementById('updateSessionForm').hidden = !document.getElementById('updateSessionForm').hidden">Edit</button>
            </h4>
        </div>
        <div id="updateSessionForm" class="row justify-content-center mb-3" hidden>
            <form action="{harmonyURL}update_session_id" method="POST" class="form-inline">
                <input type="hidden" name="viewId" value="{viewId}">
                <input type="text" name="newViewId" class="form-control mr-2" placeholder="New Session ID" required>
                <button type="submit" class="btn btn-primary">Update</button>
            </form>
        </div>
        <div class="row" style="min-width: 500px">
            <div class="container justify-content-center" align="center">
                <h3 id="GameWorldHeader">Game World View -- {defaultCamera}</h3>
                <form id="selectPixelForm" hx-post="{harmonyURL}select_pixel" hx-target="#interactor">
                    <input type="hidden" name="selectedCamera" id="selectedCamera" value="{defaultCamera}">
                    <input type="hidden" name="selectedPixel" id="selectedPixel" value="">
                    <input type="hidden" name="appendPixel" id="appendPixel" value="false">
                    <input type="hidden" name="viewId" id="viewId" value="{viewId}">
                </form>
                <div id="GameWorldViewer" style="position: relative;">
                    <img id="GameWorld" class="img-responsive border border-3 border-info bg-primary"
                        src="{harmonyURL}camWithChanges/{defaultCamera}/{viewId}"
                        style="border-radius: 40px; max-width: 90%;">
                    <canvas id="GameWorldOverlay"
                        style="position:absolute; left:0; top:0; pointer-events:auto;"></canvas>
                </div>
                <script src="/HarmonyCanvas.js"></script>
                <script>
                    // Initialize Canvas
                    window.addEventListener('load', function () {
                        initHarmonyCanvas();
                        // Poll every 1 second
                        setInterval(function () { syncCanvasData(document.getElementById("viewId").value); }, 1000);
                    });
                </script>
            </div>
            <div class="container justify-content-center" align="center">
                {cameraButtons}
            </div>
            <div class="row justify-content-center" align="center" style="min-width: 500px">
                <div id="interactor" class="row"></div>
                <!-- <hr> removed -->
                <div id="objectTable" class="row">
                    <div id="objectFilterRetriever" hx-get="{harmonyURL}objects" hx-trigger="every 1s"
                        hx-include="#viewId" hx-target="#objectFilterRetriever"></div>
                </div>
                <div class="row">
                    <!-- Admin controls removed -->
                </div>
                <div class="row">
                    <!-- Admin controls removed -->
                </div>
            </div>
        </div>
    </div>

    <!-- Rename Unit Modal — lives outside the polled container so it never reloads -->
    <div class="modal fade" id="renameUnitModal" tabindex="-1" aria-labelledby="renameUnitModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="renameUnitModalLabel">Rename Unit</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-2">New name for <strong id="renameModalCurrentName"></strong>:</p>
                    <input type="text" id="renameModalInput" class="form-control" placeholder="Unit name" required>
                    <div id="renameModalError" class="text-danger mt-1" hidden></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-warning" id="renameModalSubmit">Rename</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        (function () {
            var _oid = null;
            var _modal = null;

            window.openRenameModal = function (oid) {
                _oid = oid;
                document.getElementById('renameModalCurrentName').textContent = oid;
                var input = document.getElementById('renameModalInput');
                input.value = oid;
                document.getElementById('renameModalError').hidden = true;
                if (!_modal) {
                    _modal = new bootstrap.Modal(document.getElementById('renameUnitModal'));
                }
                _modal.show();
                document.getElementById('renameUnitModal').addEventListener('shown.bs.modal', function () {
                    input.focus();
                    input.select();
                }, { once: true });
            };

            function doRename() {
                var newName = document.getElementById('renameModalInput').value.trim();
                var errEl = document.getElementById('renameModalError');
                if (!newName || !_oid) return;
                var fd = new FormData();
                fd.append('objectName', newName);
                fetch('/harmony/objects/' + encodeURIComponent(_oid), { method: 'POST', body: fd })
                    .then(function (resp) {
                        if (resp.ok) {
                            _modal.hide();
                            htmx.ajax('GET', '/harmony/objects?viewId=' + document.getElementById('viewId').value,
                                { target: '#objectFilterRetriever' });
                        } else {
                            resp.text().then(function (t) {
                                errEl.textContent = t;
                                errEl.hidden = false;
                            });
                        }
                    });
            }

            document.getElementById('renameModalSubmit').addEventListener('click', doRename);
            document.getElementById('renameModalInput').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') doRename();
            });
        })();
    </script>
</body>

</html>
