<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <script src="/static/bootstrap.min.js"></script>
    <script src="/static/htmx.min.js"></script>
    <title>Observer Configurator</title>
</head>
<body>
    <div class="container">
        <h1 align="center">Configurator</h1>
        <div class="row" align="center">
            <div class="col" align="left">
                <input type="button" class="btn btn-primary" value="Save State" hx-post="/configurator" hx-swap="none">
                <input class="btn btn-secondary" type="button" value="Calibrate Cameras" onclick="window.location.href='/configurator/calibrator'">
            </div>
        </div>

        {% for cam in cameras %}
        <div class="row justify-content-center text-center">
            <h3 class="mt-5">Camera {{ cam.name }} 
                <input type="button" value="Delete" class="btn btn-danger" hx-post="/configurator/delete_cam/{{ cam.name }}" hx-swap="outerHTML">
            </h3>
            <div id="camContainer_{{ cam.name }}" style="position: relative; display: inline-block;">
                <img src="/configurator/camera/{{ cam.name }}" title="{{ cam.name }} Capture" height="375" id="cam{{ cam.name }}" onclick="camClickListener('{{ cam.name }}', event)">
                <canvas id="overlayCanvas_{{ cam.name }}" 
                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair;"
                    onmousedown="onMouseDown('{{ cam.name }}', event)"
                    onmousemove="onMouseMove('{{ cam.name }}', event)">
                </canvas>
            </div>
            
            <div class="text-center mt-2 d-flex flex-wrap justify-content-center align-items-center gap-2">
                <button class="btn btn-sm btn-warning" onclick="clearShape('{{ cam.name }}')">Clear Manual Points</button>
                <button class="btn btn-sm btn-secondary" onclick="undoLastPoint('{{ cam.name }}')">Undo Last</button>
            </div>

            <label for="az">Active Zone</label><br>
            <div class="container">
                <div class="row">
                    <div class="col">
                        <input type="text" name="az" id="cam{{ cam.name }}_ActiveZone" value="{{ cam.active_zone }}" size="50" hx-post="/configurator/cam{{ cam.name }}_activezone" hx-swap="none">   
                        <input type="button" class="btn btn-secondary" name="clearCam{{ cam.name }}AZ" value="Clear AZ" onclick="clearCamAZ('{{ cam.name }}', event)">
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}

        <div class="container" align="right" style="margin-top: 1rem">
            <input type="button" class="btn btn-primary" value="Add Camera" onclick="window.location.href='/configurator/new_camera'">
        </div>
    </div>
</body>
<script>
    function clearCamAZ(camName, event) {
        const formField = document.getElementById(`cam${camName}_ActiveZone`)
        formField.value = '[]'
    }

    function camClickListener(camName, event) {
        const imgElem = document.getElementById(`cam${camName}`)
        const bounds = imgElem.getBoundingClientRect();
        const left = bounds.left;
        const top = bounds.top;
        const x = event.clientX - left;
        const y = event.clientY - top;
        const cw = imgElem.clientWidth;
        const ch = imgElem.clientHeight;
        const iw = imgElem.naturalWidth;
        const ih = imgElem.naturalHeight;
        const px = x / cw * iw;
        const py = y / ch * ih;
        
        const formField = document.getElementById(`cam${camName}_ActiveZone`)
        let formValue = [];
        try {
            formValue = JSON.parse(formField.value)
        } catch (err) {
            formValue = []
        }
        formValue.push([Math.floor(px), Math.floor(py)])
        formField.value = JSON.stringify(formValue)
        formField.dispatchEvent(new Event('change'));
    }
</script>
</html>
