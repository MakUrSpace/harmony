<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Harmony VR</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <script>
    AFRAME.registerComponent("mjpeg-texture", {
      schema: {
        image:   { type: "selector" },
        canvas:  { type: "selector" },
        camName: { type: "string", default: "" },
        fps:     { type: "number", default: 15 }
      },

      init() {
        this.ctx = this.data.canvas.getContext("2d");
        this.lastFrameTime = 0;
        // Start hidden, will show when image loads
        this.el.setAttribute("visible", "false");
      },

      tick(time) {
        const frameInterval = 1000 / this.data.fps;

        if (time - this.lastFrameTime < frameInterval) {
          return;
        }

        const image = this.data.image;
        const canvas = this.data.canvas;

        if (!image.naturalWidth || !image.naturalHeight) {
          return;
        }

        if (this.el.getAttribute("visible") === false) {
          this.el.setAttribute("visible", "true");
        }

        this.ctx.drawImage(
          image,
          0,
          0,
          canvas.width,
          canvas.height
        );

        if (window.drawCameraOverlay && this.data.camName) {
            window.drawCameraOverlay(this.ctx, this.data.camName, canvas.width, canvas.height);
        }

        const mesh = this.el.getObject3D("mesh");
        const material = mesh?.material;

        if (material?.map) {
          material.map.needsUpdate = true;
        }

        this.lastFrameTime = time;
      }
    });
  </script>
  
  <script>
    const VIEW_ID = "{{ view_id }}";
  </script>
  <script src="/static/HarmonyVR.js"></script>
</head>

<body>
  <div id="mjpeg-streams" style="display:none">
  </div>

  <a-scene>
    <a-assets id="vr-assets">
    </a-assets>

    <a-entity id="rig" position="0 1.6 0">
      <a-camera id="camera" look-controls wasd-controls="acceleration: 100">
        <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
      </a-camera>
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable; lineOpacity: 0.5"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; lineOpacity: 0.5"></a-entity>
    </a-entity>

    <a-entity id="virtual-board" position="0 1.0 -1.5" rotation="-45 0 0" scale="0.05 0.05 0.05">
        <!-- Floating board hexes will be injected here -->
    </a-entity>
    
    <a-entity id="camera-windows" position="0 2 -4">
    </a-entity>

    <a-sky color="#20242a"></a-sky>
  </a-scene>
</body>
</html>
