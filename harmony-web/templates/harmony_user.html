<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="/bootstrap.min.css">
    <script src="/bootstrap.min.js"></script>
    <script src="/htmx.min.js"></script>
    <script src="/object-collapse.js?v=2"></script>
    <script src="/idiomorph-ext.js?v=1"></script>
    <script src="/discord_ui_events.js?v=4"></script>

    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/HarmonyTemplate.css?v=2">

    <title>Harmony</title>
</head>

<body>
    <div class="container-fluid px-4">
        <h1 align="center">Harmony</h1>
        <hr>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0 text-start" style="white-space: nowrap;">Session ID: {{ view_id }}
                <button class="btn btn-sm btn-outline-secondary ms-2"
                    onclick="document.getElementById('updateSessionForm').hidden = !document.getElementById('updateSessionForm').hidden">Edit</button>
                <span class="mx-2 text-muted">|</span>
                <button id="chatToggleButton" class="btn btn-sm btn-outline-primary">💬 Open Chat</button>
            </h4>
            {% if embed_compcon %}
            <div class="d-flex justify-content-center flex-grow-1">
                <ul class="nav nav-pills" id="layoutNavTabs" style="display: none;">
                    <li class="nav-item">
                        <button class="nav-link active" id="tab-harmony" onclick="switchTab('harmony')">Observer</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="tab-compcon" onclick="switchTab('compcon')">Comp/Con</button>
                    </li>
                </ul>
            </div>
            <div class="text-end">
                <div class="btn-group btn-group-sm" role="group" aria-label="Layout Toggle">
                    <input type="radio" class="btn-check" name="layoutToggle" id="layoutSplit" autocomplete="off" checked onchange="toggleLayout('split')">
                    <label class="btn btn-outline-primary" for="layoutSplit">Split</label>
                    <input type="radio" class="btn-check" name="layoutToggle" id="layoutTabs" autocomplete="off" onchange="toggleLayout('tabs')">
                    <label class="btn btn-outline-primary" for="layoutTabs">Tabs</label>
                </div>
            </div>
            {% endif %}
        </div>
        <div id="updateSessionForm" class="row justify-content-start mb-3" hidden>
            <form action="{{ harmony_url }}update_session_id" method="POST" class="form-inline">
                <input type="hidden" name="viewId" value="{{ view_id }}">
                <input type="text" name="newViewId" class="form-control mr-2" placeholder="New Session ID" required>
                <button type="submit" class="btn btn-primary">Update</button>
            </form>
        </div>
        <div class="row flex-nowrap" style="min-width: 500px" id="mainLayoutRow">
            <div class="{% if embed_compcon %}col-5{% else %}col-12{% endif %}" id="harmonyColumn">
                <div class="container-fluid justify-content-center" align="center">
                <div id="GameWorldWrapper">
                <h3 id="GameWorldHeader" style="position: relative;">
                    <span id="GameWorldHeaderText">Game World View -- {{ default_camera }}</span>
                    <button type="button" class="btn btn-sm btn-outline-info" style="position: absolute; right: 0; bottom: 10px;" id="expandViewerBtn">⤢ Expand</button>
                </h3>
                <form id="selectPixelForm" hx-post="{{ harmony_url }}select_pixel" hx-target="#interactor" hx-sync="this:queue all">
                    <input type="hidden" name="selectedCamera" id="selectedCamera" value="{{ default_camera }}">
                    <input type="hidden" name="selectedPixel" id="selectedPixel" value="">
                    <input type="hidden" name="appendPixel" id="appendPixel" value="false">
                    <input type="hidden" name="viewId" id="viewId" value="{{ view_id }}">
                </form>
                <div id="GameWorldViewer" style="position: relative; display: inline-block; max-width: 90%; max-height: 70vh;">
                    <img id="GameWorld" class="img-responsive border border-3 border-info bg-primary"
                        src="{{ harmony_url }}camWithChanges/{{ default_camera }}/{{ view_id }}"
                        style="border-radius: 40px; max-width: 100%; max-height: 70vh; height: auto; width: auto; object-fit: contain;">
                    <canvas id="GameWorldOverlay"
                        style="position:absolute; left:0; top:0; pointer-events:auto;"></canvas>
                </div>
                <script src="/HarmonyCanvas.js?v=4"></script>
            </div>
            <div class="container justify-content-center mb-3" align="center">
                <div class="d-inline-block border border-secondary p-2" style="border-radius: 8px;">
                    <strong>Viewer Controls: </strong>
                    {{ camera_buttons|safe }}
                    <div class="form-check form-switch d-inline-block ms-3">
                        <input class="form-check-input" type="checkbox" id="showGridHarmony" {{ show_grid_checked }} onchange="toggleHarmonyOverlays()">
                        <label class="form-check-label" for="showGridHarmony">Show Grid</label>
                    </div>
                    <div class="form-check form-switch d-inline-block ms-3">
                        <input class="form-check-input" type="checkbox" id="showObjectsHarmony" {{ show_objects_checked }} onchange="toggleHarmonyOverlays()">
                        <label class="form-check-label" for="showObjectsHarmony">Show Objects</label>
                    </div>
                </div>
            </div>
            
            <div class="container justify-content-center mb-4" align="center" id="selectionPalette" style="display: none;">
                <div class="border border-secondary p-3 mx-auto" style="border-radius: 8px; max-width: 600px;">
                    <h5 class="border-bottom pb-2 mb-3">Selection Palette</h5>
                    
                    <div class="mb-3">
                        <strong>Tools: </strong>
                        <button class="btn btn-sm btn-outline-danger mx-2" onclick="clearSelection()">Clear Selection</button>
                        
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="toolMode" id="toolNone" value="none" checked onchange="setToolMode('none')">
                            <label class="form-check-label" for="toolNone">None</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="toolMode" id="toolBurst" value="burst" onchange="setToolMode('burst')">
                            <label class="form-check-label" for="toolBurst">Burst (R: <input type="number" id="burstRadius" value="2" min="1" max="10" style="width: 40px;" onchange="updateToolParams()">)</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="toolMode" id="toolCone" value="cone" onchange="setToolMode('cone')">
                            <label class="form-check-label" for="toolCone">Cone (L: <input type="number" id="coneLength" value="3" min="1" max="10" style="width: 40px;" onchange="updateToolParams()">)</label>
                        </div>
                    </div>
                    
                    <div id="interactor" class="mb-3 text-start p-2 border border-secondary rounded">
                        <!-- Selected hex information gets rendered here -->
                        <span class="text-muted">No hexes selected.</span>
                    </div>

                </div>
                </div>
            <script>
                function toggleHarmonyOverlays() {
                    let formData = new URLSearchParams();
                    let showGrid = document.getElementById('showGridHarmony').checked;
                    let showObjects = document.getElementById('showObjectsHarmony').checked;
                    let viewId = document.getElementById('viewId').value;
                    formData.append('show_grid', showGrid);
                    formData.append('show_objects', showObjects);
                    formData.append('viewId', viewId);
                    fetch('{{ harmony_url }}set_overlays', { method: 'POST', body: formData });
                    
                    // Instead of hiding the canvas, re-render it so that
                    // the selection cell is still drawn.
                    if (window.harmonyEditor) window.harmonyEditor.render();
                    if (window.harmonyEditors) window.harmonyEditors.forEach(ed => ed.render());
                }
            </script>
            <div class="row justify-content-center" align="center" style="min-width: 500px">
                <div id="objectTable" class="row w-100 justify-content-center">
                    <div id="objectFilterRetriever" hx-ext="morph" hx-swap="morph:innerHTML" hx-get="{{ harmony_url }}objects?isUserUI=true" hx-trigger="every 1s"
                        hx-include="#viewId" hx-target="#objectFilterRetriever"></div>
                <script>
                function submitCreateObject(event) {
                    let cells = [];
                    if (window.toolMode && window.toolMode !== 'none' && window.currentToolHighlight && window.currentToolHighlight.length > 0) {
                        cells = window.currentToolHighlight;
                    } else {
                        let sel = window.harmonyCanvasData ? window.harmonyCanvasData.selection : null;
                        if (sel && sel.firstCell) {
                            cells.push([sel.firstCell._q, sel.firstCell._r]);
                            if (sel.additionalCells) {
                                sel.additionalCells.forEach(c => cells.push([c._q, c._r]));
                            }
                        }
                    }
                    
                    if (cells.length === 0) {
                        alert("No cells selected!");
                        return;
                    }
                    
                    let name = document.getElementById('createObjectName').value;
                    let formData = new URLSearchParams();
                    formData.append('name', name);
                    formData.append('cells', JSON.stringify(cells));
                    
                    fetch('{{ harmony_url }}objects', {
                        method: 'POST',
                        body: formData,
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                    }).then(r => {
                        document.getElementById('createObjectName').value = '';
                        if (typeof clearSelection === 'function') clearSelection();
                    });
                }
                </script>
                </div>
                <div class="row">
                    <!-- Admin controls removed -->
                </div>
                <div class="row">
                    <!-- Admin controls removed -->
                </div>
            </div>
            </div>
            </div>
            {% if embed_compcon %}
            <div class="col-7" id="compconColumn">
                <div class="w-100 sticky-top" style="height: 80vh; top: 20px;">
                    <iframe src="https://compcon.app/" width="100%" height="100%" style="border: 1px solid #ccc; border-radius: 8px;"></iframe>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
    <script>
        function toggleLayout(mode) {
            const harmonyCol = document.getElementById('harmonyColumn');
            const compconCol = document.getElementById('compconColumn');
            const navTabs = document.getElementById('layoutNavTabs');
            if (!harmonyCol || !compconCol || !navTabs) return;
            
            if (mode === 'split') {
                navTabs.style.display = 'none';
                harmonyCol.className = 'col-5';
                harmonyCol.style.display = 'block';
                compconCol.className = 'col-7';
                compconCol.style.display = 'block';
            } else {
                navTabs.style.display = 'flex';
                harmonyCol.className = 'col-12';
                compconCol.className = 'col-12';
                switchTab('harmony');
            }
            if (window.harmonyEditor) window.harmonyEditor.render();
            if (window.harmonyEditors) window.harmonyEditors.forEach(ed => ed.render());
        }
        
        function switchTab(tab) {
            const harmonyCol = document.getElementById('harmonyColumn');
            const compconCol = document.getElementById('compconColumn');
            const tabHarmony = document.getElementById('tab-harmony');
            const tabCompcon = document.getElementById('tab-compcon');
            const layoutTabs = document.getElementById('layoutTabs');
            if (!harmonyCol || !compconCol || !tabHarmony || !tabCompcon || !layoutTabs) return;
            
            if (layoutTabs.checked) {
                if (tab === 'harmony') {
                    harmonyCol.style.display = 'block';
                    compconCol.style.display = 'none';
                    tabHarmony.classList.add('active');
                    tabCompcon.classList.remove('active');
                } else {
                    harmonyCol.style.display = 'none';
                    compconCol.style.display = 'block';
                    tabHarmony.classList.remove('active');
                    tabCompcon.classList.add('active');
                }
            }
        }
    </script>

    <!-- Rename Unit Modal — lives outside the polled container so it never reloads -->
    <div class="modal fade" id="renameUnitModal" tabindex="-1" aria-labelledby="renameUnitModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="renameUnitModalLabel">Rename Unit</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-2">New name for <strong id="renameModalCurrentName"></strong>:</p>
                    <input type="text" id="renameModalInput" class="form-control" placeholder="Unit name" required>
                    <div id="renameModalError" class="text-danger mt-1" hidden></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-warning" id="renameModalSubmit">Rename</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        (function () {
            var _oid = null;
            var _modal = null;

            window.openRenameModal = function (oid) {
                _oid = oid;
                document.getElementById('renameModalCurrentName').textContent = oid;
                var input = document.getElementById('renameModalInput');
                input.value = oid;
                document.getElementById('renameModalError').hidden = true;
                if (!_modal) {
                    _modal = new bootstrap.Modal(document.getElementById('renameUnitModal'));
                }
                _modal.show();
                document.getElementById('renameUnitModal').addEventListener('shown.bs.modal', function () {
                    input.focus();
                    input.select();
                }, { once: true });
            };

            function doRename() {
                var newName = document.getElementById('renameModalInput').value.trim();
                var errEl = document.getElementById('renameModalError');
                if (!newName || !_oid) return;
                var fd = new FormData();
                fd.append('objectName', newName);
                fetch('/harmony/objects/' + encodeURIComponent(_oid), { method: 'POST', body: fd })
                    .then(function (resp) {
                        if (resp.ok) {
                            _modal.hide();
                            htmx.ajax('GET', '/harmony/objects?isUserUI=true&viewId=' + document.getElementById('viewId').value,
                                { target: '#objectFilterRetriever' });
                        } else {
                            resp.text().then(function (t) {
                                errEl.textContent = t;
                                errEl.hidden = false;
                            });
                        }
                    });
            }

            document.getElementById('renameModalSubmit').addEventListener('click', doRename);
            document.getElementById('renameModalInput').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') doRename();
            });
        })();
    </script>
    <!-- Floating Chat Widget -->
    <style>
        #discordChatWidget {
            position: fixed;
            top: 60px;
            left: 20px;
            width: 350px;
            height: 450px;
            background: var(--panel-color) !important;
            border: 2px solid var(--dim-color) !important;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            z-index: 1050;
            font-family: 'Share Tech Mono', monospace;
        }
        #discordChatWidget .chat-header {
            background: var(--dim-color) !important;
            color: var(--secondary-color) !important;
            padding: 10px;
            border-bottom: 2px solid var(--secondary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #discordChatWidget .nav-tabs {
            border-bottom: 1px solid var(--dim-color) !important;
            background: #000;
            border-radius: 0;
        }
        #discordChatWidget .nav-link {
            color: #4a6c6c !important;
            border: none !important;
            border-radius: 0 !important;
            background: transparent !important;
            text-transform: uppercase;
            font-size: 0.85rem;
            padding: 8px 12px;
        }
        #discordChatWidget .nav-link.active {
            color: var(--secondary-color) !important;
            background: var(--panel-color) !important;
            border-bottom: 2px solid var(--secondary-color) !important;
            text-shadow: 0 0 5px var(--secondary-color);
        }
        #discordChatWidget .tab-content {
            background: var(--panel-color) !important;
            color: var(--primary-color) !important;
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        #discordChatWidget .form-control {
            background: #000 !important;
            border: 1px solid var(--dim-color) !important;
            color: var(--primary-color) !important;
            border-radius: 0 !important;
        }
        #discordChatWidget .btn-primary {
            border-radius: 0 !important;
            border: 1px solid var(--secondary-color) !important;
            color: var(--secondary-color) !important;
            background: transparent !important;
            text-transform: uppercase;
        }
        #discordChatWidget .btn-primary:hover {
            background: var(--secondary-color) !important;
            color: #000 !important;
            box-shadow: 0 0 10px var(--secondary-color);
        }
    </style>

    <div id="discordChatWidget" style="display: none;">
        <div class="chat-header">
            <span style="font-weight: bold;">Discord Chat <span id="widgetChatStatus" style="font-weight: normal; font-size: 0.85em; margin-left: 10px;">(Stopped)</span></span>
            <button class="closeChatBtn" style="background: transparent; border: none; color: var(--danger-color); font-size: 1.2rem; line-height: 1; text-shadow: 0 0 5px var(--danger-color);">&times;</button>
        </div>
        <ul class="nav nav-tabs" id="chatTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active chat-nav-btn" data-bs-toggle="tab" data-bs-target="#chat-group" type="button" role="tab" data-channel="group">Group</button>
            </li>
        </ul>
        <div class="tab-content" id="chatTabContent">
            <div class="tab-pane fade show active h-100" id="chat-group" role="tabpanel" data-channel-content="group">
                <div id="chat-messages-group" style="height: 100%; overflow-y: auto;"></div>
            </div>
        </div>
        <div style="padding: 10px; border-top: 1px solid var(--dim-color); display: flex; background: var(--panel-color);">
            <input type="text" id="chatInput" class="form-control me-2" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button id="sendChatBtn" onclick="sendChatMessage()" class="btn btn-primary">Send</button>
        </div>
    </div>
</body>

</html>
