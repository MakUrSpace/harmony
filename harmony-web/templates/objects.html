<div class="d-flex justify-content-between align-items-center mb-2">
    <h4>Objects</h4>
</div>

{% for obj in objects %}
<div class="d-flex flex-row justify-content-between align-items-center mb-2 border border-secondary border-2 p-2" style="border-radius: 8px;">
    <!-- Left column: Object info -->
    <div class="d-flex flex-column pe-2" style="flex: 1;">
        <h5 class="mb-1 border-bottom border-info border-1 pb-1">{{ obj.oid }}</h5>
        <p class="mb-1 text-muted small">Pos: {{ obj.constituent_axials.len() }} hexes</p>
        <p class="mb-2 small">Type: <strong>{{ obj.object_type }}</strong></p>
        {% if !is_user_ui %}
        <div>
            <button hx-delete="/harmony/objects/{{ obj.oid }}" hx-target="#interactor" class="btn btn-sm btn-outline-danger">Delete</button>
        </div>
        {% endif %}
    </div>

    <!-- Right column: Camera Snapshots -->
    <div class="d-flex flex-wrap gap-2 justify-content-end align-items-center" style="min-width: fit-content;">
        {% for cam in cameras %}
        <div class="border border-info" style="border-radius: 4px; background: #000; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
            <img id="snapshot_{{ obj.oid }}_{{ cam }}_{{ obj.position_hash() }}" hx-preserve="true" src="/harmony/objects/{{ obj.oid }}/snapshot/{{ cam }}?v={{ obj.position_hash() }}" alt="{{ cam }}" style="max-width: 100%; max-height: 100%; object-fit: contain;">
        </div>
        {% endfor %}
    </div>
</div>
{% endfor %}
