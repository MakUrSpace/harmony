<!doctype html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <script src="/static/bootstrap.min.js"></script>
    <script src="/static/htmx.min.js"></script>
    <script src="/static/object-collapse.js"></script>
    <script src="/static/idiomorph-ext.js"></script>

    <style>
        table, th, td {
          border: 1px solid black;
          padding: 15px;
        }
    </style>
    
    <title>Observer</title>
</head>
<body>
<div class="container">
    <h1 align="center">Observer</h1>
    <div class="container">
        <div class="row">
            <div class="col" align="left">
                <input class="btn btn-danger" type="button" value="Reset Observer" hx-post="/reset">
            </div>
            <div class="col" align="right">
                <!-- Configurator removed from User UI -->
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col" style="min-width: 500px">
            <h2 class="mt-5">Capture Control</h2>
            <div class="container" hx-get="/get_mode_controller" hx-trigger="every 1.5s" id="modeController">
            </div>
            <div class="container">
                <img class="img-fluid border border-info border-3" src="/observer_console" style="border-radius: 50px; border-width: 3">
            </div>

            <div class="container justify-content-center">
                <h3 id="liveCamHeader" class="mt-5">Live Cameras (Selected {{ default_camera }})</h3>
                <img id="liveCam" class="img-responsive border border-3 border-primary bg-primary" src="/camWithChanges/{{ default_camera }}" style="transform: rotate(-90deg); border-radius: 40px; max-width: 80%">
            </div>
            <div class="container justify-content-center">
                <script>
                function liveCameraClick(camNum){
                    var header = document.querySelector("#liveCamHeader")
                    header.innerText = `Live Cameras (Selected ${camNum})`
                    var img = document.querySelector("#liveCam")
                    img.src = `/camWithChanges/${camNum}`
                }
                </script>
                {% for cam in cameras %}
                <button class="btn btn-info m-1" onclick="liveCameraClick('{{ cam }}')">{{ cam }}</button>
                {% endfor %}
            </div>
        </div>
	<div class="col" align="center" style="min-width: 500px">
            <div class="row justify-content-center">
                <h2 class="mt-5">Object Tracker</h2>
            </div>
            <hr class="mt-2 mb-3">
            <div class="row justify-content-center">
                <div id="objectInteractor" class="container">
                    <div id="objectTable" hx-ext="morph" hx-swap="morph:innerHTML" hx-get="/objects" hx-trigger="every 1s"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
    </div>
</div>
</body>
</html>
